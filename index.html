<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta
    name="description"
    content="Synapse 2026 Day 3 AI Escape Challenge mission guide."
  />
  <title>Escape the AI Lab</title>

  <style>
    :root {
      --background: #05050a;
      --surface: rgba(20, 18, 31, 0.78);
      --surface-strong: rgba(28, 24, 43, 0.94);
      --surface-soft: rgba(255, 255, 255, 0.045);

      --text: #fbf9ff;
      --muted: #b9b2c8;
      --gold: #f6ca68;
      --gold-light: #ffe7a8;
      --violet: #a86cff;
      --cyan: #63d7ff;
      --green: #83e6a2;

      --border: rgba(255, 255, 255, 0.10);
      --gold-border: rgba(246, 202, 104, 0.30);
      --violet-border: rgba(168, 108, 255, 0.38);

      --shadow:
        0 40px 100px rgba(0, 0, 0, 0.58),
        0 0 60px rgba(98, 58, 160, 0.10);
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      overflow-x: hidden;
      background:
        radial-gradient(circle at 12% 12%, rgba(126, 66, 190, 0.24), transparent 32%),
        radial-gradient(circle at 87% 20%, rgba(56, 150, 210, 0.16), transparent 30%),
        radial-gradient(circle at 50% 105%, rgba(246, 202, 104, 0.10), transparent 36%),
        linear-gradient(180deg, #0b0912 0%, var(--background) 64%);
      font-family:
        Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
        "Segoe UI", sans-serif;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    body::before {
      opacity: 0.35;
      background-image:
        radial-gradient(circle, rgba(255, 255, 255, 0.85) 0 1px, transparent 1.4px),
        radial-gradient(circle, rgba(246, 202, 104, 0.75) 0 1px, transparent 1.4px);
      background-position: 0 0, 43px 57px;
      background-size: 110px 110px, 155px 155px;
      mask-image: linear-gradient(to bottom, black 0%, transparent 88%);
    }

    body::after {
      background:
        linear-gradient(
          115deg,
          transparent 0 44%,
          rgba(255, 255, 255, 0.025) 48%,
          transparent 52% 100%
        );
      opacity: 0.45;
    }

    button {
      font: inherit;
    }

    .page {
      position: relative;
      z-index: 1;
      width: min(1080px, calc(100% - 32px));
      margin: 0 auto;
      padding: 46px 0 58px;
    }

    .hero {
      max-width: 860px;
      margin: 0 auto 30px;
      text-align: center;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      color: var(--gold);
      font-size: 0.76rem;
      font-weight: 850;
      letter-spacing: 0.22em;
      text-transform: uppercase;
    }

    .eyebrow::before,
    .eyebrow::after {
      content: "";
      width: 28px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold));
    }

    .eyebrow::after {
      transform: rotate(180deg);
    }

    h1 {
      margin: 12px 0 12px;
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(3.15rem, 7vw, 6.1rem);
      font-weight: 700;
      line-height: 0.92;
      letter-spacing: -0.055em;
      text-wrap: balance;
      text-shadow:
        0 8px 28px rgba(0, 0, 0, 0.45),
        0 0 36px rgba(168, 108, 255, 0.10);
    }

    .subtitle {
      max-width: 720px;
      margin: 0 auto;
      color: var(--muted);
      font-size: clamp(0.98rem, 2vw, 1.08rem);
      line-height: 1.65;
      text-wrap: balance;
    }

    .progress-wrap {
      position: relative;
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 14px;
      margin: 30px 0 20px;
    }

    .progress-wrap::before {
      content: "";
      position: absolute;
      top: 25px;
      left: 8%;
      right: 8%;
      height: 1px;
      background: linear-gradient(
        90deg,
        transparent,
        rgba(255, 255, 255, 0.14) 12%,
        rgba(255, 255, 255, 0.14) 88%,
        transparent
      );
      z-index: -1;
    }

    .progress-step {
      min-width: 0;
      padding: 11px 9px;
      color: #8f889d;
      text-align: center;
      border: 1px solid transparent;
      border-radius: 14px;
      background: rgba(7, 6, 12, 0.68);
      backdrop-filter: blur(10px);
      transition:
        transform 180ms ease,
        border-color 180ms ease,
        background 180ms ease,
        color 180ms ease;
    }

    .progress-step strong {
      display: inline-grid;
      width: 26px;
      height: 26px;
      margin-right: 5px;
      place-items: center;
      color: inherit;
      font-size: 0.78rem;
      border: 1px solid currentColor;
      border-radius: 50%;
    }

    .progress-step span {
      font-size: 0.79rem;
      font-weight: 750;
    }

    .progress-step.active {
      color: var(--gold-light);
      border-color: var(--gold-border);
      background: rgba(246, 202, 104, 0.08);
      box-shadow: 0 10px 30px rgba(246, 202, 104, 0.08);
      transform: translateY(-2px);
    }

    .progress-step.complete {
      color: var(--green);
      border-color: rgba(131, 230, 162, 0.22);
      background: rgba(131, 230, 162, 0.065);
    }

    .card {
      position: relative;
      overflow: hidden;
      padding: clamp(26px, 5vw, 48px);
      border: 1px solid var(--gold-border);
      border-radius: 30px;
      background:
        linear-gradient(145deg, rgba(34, 29, 51, 0.94), rgba(15, 14, 24, 0.84)),
        var(--surface);
      box-shadow: var(--shadow);
      backdrop-filter: blur(24px);
      isolation: isolate;
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      z-index: -1;
      background:
        radial-gradient(circle at 0 0, rgba(168, 108, 255, 0.13), transparent 34%),
        radial-gradient(circle at 100% 100%, rgba(99, 215, 255, 0.08), transparent 30%);
    }

    .card::after {
      content: "";
      position: absolute;
      inset: 1px;
      z-index: -1;
      border-radius: 29px;
      border: 1px solid rgba(255, 255, 255, 0.025);
      pointer-events: none;
    }

    .mission-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 24px;
      margin-bottom: 20px;
    }

    .mission-number {
      margin-bottom: 8px;
      color: var(--gold);
      font-size: 0.76rem;
      font-weight: 850;
      letter-spacing: 0.17em;
      text-transform: uppercase;
    }

    h2 {
      margin: 0;
      font-size: clamp(2rem, 4vw, 3.15rem);
      line-height: 1.02;
      letter-spacing: -0.035em;
    }

    .seal {
      position: relative;
      flex: 0 0 auto;
      display: grid;
      width: 68px;
      height: 68px;
      place-items: center;
      font-size: 2rem;
      border: 1px solid rgba(246, 202, 104, 0.38);
      border-radius: 22px;
      background:
        linear-gradient(145deg, rgba(246, 202, 104, 0.17), rgba(246, 202, 104, 0.055));
      box-shadow:
        inset 0 0 28px rgba(246, 202, 104, 0.08),
        0 12px 28px rgba(0, 0, 0, 0.20);
      transform: rotate(3deg);
    }

    .seal::after {
      content: "";
      position: absolute;
      inset: 6px;
      border: 1px solid rgba(246, 202, 104, 0.16);
      border-radius: 16px;
    }

    .mission-description {
      max-width: 760px;
      margin: 0 0 24px;
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.65;
    }

    .prompt-box {
      position: relative;
      margin: 24px 0;
      padding: 25px 26px;
      overflow: hidden;
      border: 1px solid var(--violet-border);
      border-radius: 19px;
      background:
        linear-gradient(135deg, rgba(14, 11, 23, 0.96), rgba(9, 8, 15, 0.80));
      box-shadow:
        inset 0 0 34px rgba(168, 108, 255, 0.065),
        0 12px 32px rgba(0, 0, 0, 0.20);
    }

    .prompt-box::before {
      content: "✦";
      position: absolute;
      right: 22px;
      top: 16px;
      color: rgba(246, 202, 104, 0.32);
      font-size: 1.2rem;
    }

    .prompt-label {
      margin-bottom: 11px;
      color: var(--cyan);
      font-size: 0.72rem;
      font-weight: 850;
      letter-spacing: 0.17em;
      text-transform: uppercase;
    }

    .prompt-text {
      margin: 0;
      padding-right: 34px;
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(1.45rem, 3.2vw, 2.15rem);
      line-height: 1.32;
      letter-spacing: -0.018em;
    }

    .task-section {
      margin-top: 24px;
    }

    .task-heading {
      margin: 0 0 13px;
      color: var(--text);
      font-size: 0.78rem;
      font-weight: 850;
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }

    .task-list {
      display: grid;
      gap: 10px;
      margin: 0;
      padding: 0;
      list-style: none;
      counter-reset: task;
    }

    .task-list li {
      position: relative;
      min-height: 43px;
      padding: 11px 14px 11px 48px;
      color: #e9e4f1;
      line-height: 1.48;
      border: 1px solid rgba(255, 255, 255, 0.075);
      border-radius: 13px;
      background: rgba(255, 255, 255, 0.035);
      counter-increment: task;
    }

    .task-list li::before {
      content: counter(task);
      position: absolute;
      left: 12px;
      top: 9px;
      display: grid;
      width: 25px;
      height: 25px;
      place-items: center;
      color: var(--gold-light);
      font-size: 0.74rem;
      font-weight: 850;
      border: 1px solid rgba(246, 202, 104, 0.28);
      border-radius: 8px;
      background: rgba(246, 202, 104, 0.075);
    }

    .notice {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      margin-top: 22px;
      padding: 15px 17px;
      color: #dfefff;
      font-size: 0.92rem;
      line-height: 1.52;
      border: 1px solid rgba(99, 215, 255, 0.22);
      border-radius: 14px;
      background: rgba(99, 215, 255, 0.075);
    }

    .notice::before {
      content: "✦";
      flex: 0 0 auto;
      color: var(--cyan);
      font-weight: 900;
    }

    .actions {
      display: flex;
      justify-content: space-between;
      gap: 14px;
      margin-top: 26px;
    }

    .button {
      min-height: 46px;
      padding: 12px 18px;
      color: var(--text);
      font-weight: 800;
      border: 1px solid transparent;
      border-radius: 13px;
      cursor: pointer;
      transition:
        transform 180ms ease,
        box-shadow 180ms ease,
        background 180ms ease,
        opacity 180ms ease;
    }

    .button:hover:not(:disabled) {
      transform: translateY(-2px);
    }

    .button.primary {
      color: #17110a;
      background: linear-gradient(135deg, var(--gold), var(--gold-light));
      box-shadow: 0 14px 30px rgba(246, 202, 104, 0.15);
    }

    .button.primary:hover:not(:disabled) {
      box-shadow: 0 18px 36px rgba(246, 202, 104, 0.23);
    }

    .button.secondary {
      color: #e7e2ef;
      border-color: rgba(255, 255, 255, 0.12);
      background: rgba(255, 255, 255, 0.055);
    }

    .button.secondary:hover:not(:disabled) {
      background: rgba(255, 255, 255, 0.085);
    }

    .button:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }

    .finish {
      max-width: 740px;
      margin: 0 auto;
      text-align: center;
    }

    .finish .seal {
      margin: 0 auto 20px;
      transform: none;
    }

    .finish h2 {
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(2.5rem, 6vw, 4.3rem);
    }

    .classroom-box {
      margin-top: 25px;
      padding: 20px 22px;
      color: #e8f8ee;
      text-align: left;
      line-height: 1.7;
      border: 1px solid rgba(131, 230, 162, 0.24);
      border-radius: 17px;
      background: rgba(131, 230, 162, 0.07);
    }

    .classroom-box strong {
      color: var(--green);
    }

    .footer-note {
      margin: 20px 0 0;
      color: #857f90;
      text-align: center;
      font-size: 0.83rem;
    }

    @media (max-width: 720px) {
      .page {
        padding-top: 32px;
      }

      .progress-wrap {
        gap: 8px;
        overflow-x: auto;
        scrollbar-width: none;
      }

      .progress-wrap::-webkit-scrollbar {
        display: none;
      }

      .progress-step {
        min-width: 58px;
      }

      .progress-step span {
        display: none;
      }

      .progress-wrap::before {
        display: none;
      }

      .mission-header {
        align-items: center;
      }

      .seal {
        width: 56px;
        height: 56px;
        font-size: 1.6rem;
        border-radius: 18px;
      }

      .actions {
        flex-direction: column-reverse;
      }

      .button {
        width: 100%;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        scroll-behavior: auto !important;
        transition: none !important;
      }
    }
  </style>
</head>

<body>
  <main class="page">
    <header class="hero">
      <div class="eyebrow">Synapse 2026 · Day 3 Challenge</div>
      <h1>Escape the AI Lab</h1>
      <p class="subtitle">
        Reveal five magical missions and discover how ChatGPT predicts the next
        token. Complete each task in Google Classroom before continuing.
      </p>
    </header>

    <section
      class="progress-wrap"
      id="progress"
      aria-label="Mission progress"
    ></section>

    <section
      class="card"
      id="missionCard"
      aria-live="polite"
    ></section>

    <p class="footer-note">
      This website only reveals the missions. Submit all work through Google Classroom.
    </p>
  </main>

  <script src="script.js"></script>
</body>
</html>
